<!DOCTYPE html>
<html>
    <head>
        <title> scholarship / seminar registration Form</title>
    </head>
    <body>

        <h2> scholarship / seminar Registration Form </h2>

        <form>

            <!--Personal Information-->
            <fieldset>
                <h2>Scholarship / seminar Registration form </h2>
                <form>
                    <!--Personal Information-->
                    <fieldset>
                        <legend>Personal Information </legend>
                        <label>Full Name:</label>
                        <input type="text" name="fullname"><br><br>
                        <label>Email:</label>
                        <input type="email"name="email"><br><br>

                        <label>Gender:</label>
                        <input type="radio" name="gender" value="male"> Male
                        <input type="radio" name="gender" value="female"> female
                        <input type="radio" name="gender" value="other"> other
                    </fieldset>
                    <br>

                    <!--Acadamic Information-->
                    <fieldset>
                        <legend>Academic Details</legend>

                        <label>Course:<label>
                            <select name="course">
                                <option value="">--Select Course--</option>
                                <option value="btech">B.tech</option>
                                <option value="bsc">B.sc</option>
                                <option value="bca">BCA</option>
                                <option value="mca">MCA</option>
                                <option value="msc">M.SC</option>
                            </select>
                            <br><br>

                            <label>Year of study:</label>
                            <select name="year">
                                <option>1st Year</option>
                                <option>2nd Year</option>
                                <option>3rd Year</option>
                                <option>4th Year</option>
                            </select>
                        </fieldset>

                        <br>
                        <!--Seminar Preference-->
                        <fieldset>
                            <legend> Seminar Topics Intrested In</legend>

                            <Input type="checkbox" name="topic" value="ai"> Artifitial Intelligence<br>
                            <Input type="checkbox" name="topic" value="web">Web Designing<br>
                            <Input type="checkbox" name="topic" value="cyber"> Cyber security<br>
                            <Input type="checkbox" name="topic" value="data"> Data Science
                        </fieldset>

                        <br>
                        <input type="submit" value="Register">
                        <input type="reset" value="Clear">

                </form>

            </body>


</html>
